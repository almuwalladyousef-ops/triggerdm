name: Poll Instagram Comments

on:
  schedule:
    - cron: '0/5 * * * *'
    - cron: '1/5 * * * *'
    - cron: '2/5 * * * *'
    - cron: '3/5 * * * *'
    - cron: '4/5 * * * *'
  workflow_dispatch:

concurrency:
  group: poll-instagram-comments
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Poll comments
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://triggerdm.vercel.app/api/poll-comments?sinceMinutes=10"
