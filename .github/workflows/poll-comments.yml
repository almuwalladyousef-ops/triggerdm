name: Poll Instagram Comments

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Poll comments
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://triggerdm.vercel.app/api/poll-comments?sinceMinutes=10"
